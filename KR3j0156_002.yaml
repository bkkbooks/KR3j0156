body:
  text: 雨航雜録卷下明馮時可撰朱文公在浙東時侍御史謝廓然陳賈秘書郎趙彦仲首攻之後以提刑召對人恐其遂陟清要唆侍郎林栗極論之謂其竊程張緒餘為浮誕宗主律以治世之法則亂人之首其後韓侂胄秉政則御史林采施康年首斥為偽學是時䑓諫皆以文公為竒貨有御史胡紘者故嘗謁文公建陽山中文公飯以脫粟紘怒其不近人情物色經年條其過失與太常少卿沈繼祖共詆文公十罪汪義端余嚞又特請斬以絶偽學京鏜何澹軰皆附和之至謂文公講學山中棄母不養使其乞食親黨嗟哉䜛人之言至此極哉宋之亡宜也方林栗論文公時其友人止之謂朱待制當今聖賢何仇而必欲痛詆林曰吾但見其面貌可憎吾擊邪人非詆聖賢也友人曰不見昔人指孔子䘮家狗者想亦見其面貌可憎耳林曰使孔子而在吾亦不辭為叔孫武叔矧此么麽乎嗟乎小人之肆無忌憚若此自古而然矣楚志稱百嵗楊不知何許人常徃來太和及荆襄間人有見之四十年前髪已二毛今更漆黒口皆齯齒似重生者楊自憶為天順二年生計百嵗外矣所居挾二姬嘗以御女術遊諸貴豪家自云吾貧不能得三姬得三姬即不死士大夫慕長生者都與遊而曹中丞尤尊信復市一姬與御之術敗而死未幾曹中丞亦以此術死徐叔明先生作傳刺焉然叔明毎謂神仙必無有似非通儒之論嘗見荀潁川著論以為人有變化而僊者乃異也非僊也男化為女者有矣死人復生者有矣夫豈人之性哉愚謂人之得僊乃稟天地自然之氣如龜鶴之於蜉蝣如松栢之於蘿薜豈其為異但以御女求長生則可斷其必無盖凢人欲動則精流如蹶張之弩孰能禦之已之精不能制而能採人之精乎强制逆閉蓄穢藴熱為疽為腫其蓄藴至二三年者一敗則如决渠死且不旋踵如譚襄敏周銀臺皆以過人之聰明而溺於此可鑑也余友汝遠亦喜談此余毎闢之則曰黄帝御萬女乗龍鼎湖汝何知余曰黄帝嘗藥一日吞七十毒而化若能一日吞七十毒耶汝遠無以應荀潁川釋仁者夀言内不傷性外不傷物上不違天下不違人處正居中形神以和故咎徴不至而休嘉集之余嘗書於座右或問何以不傷性曰無欲無慕問何以不傷物曰無怒無猜問何以不違天曰富貴貧賤無所擇問何以不違人曰才學伎倆無所逞人主有公賦無私求有公用無私費有公役無私使有公賜無私惠有公怒無私怨此數語可稱五羙茍能如之於從政乎何有一事逆而心憎一言拂而心銜樹荆棘於靈䑓障雲霧於天門嗟哉故其自隘而自戕乎乃又經年懐之而不釋易世志之而不忘若然者四海之中無樂地百年之内無泰時甚矣其惑也女子有未嫁人而守節者熈甫著論非之曰女子無以身許人之道未嫁而為夫死且不改適是以身許人也男女不相知名婚姻之禮父母主之否則伯父世母否則族長者男女無自相婚姻之禮所以厚别而重亷恥之防也女子在室惟其父母為之許聘而已無所與六禮既備婿親迎授綏母送之門共牢合卺而後為夫婦茍一禮不備而徃則為奔女未嫁而為人死且守是不待六禮不待父母之命而奔者非禮也古者婿有三年之喪則使媒致命女氏者不得嗣為兄弟女未廟見而死則歸塟於女子氏之黨示未成婦也未成婦則不繋於夫也不繋於夫而可以身死且不改適哉雖然古者女子笄而許嫁今或孩而許嫁命之父母告之宗廟厯十餘寒暑而女子乆知其當適某氏矣一旦不幸遭變故遽改容而他適於情於義亦有不安者故嫁固不為妨禮而守亦不為背禮取節焉可也夫人臣之朝不與燕不坐而死節者古以為過然夷齊無禄位而恥食周粟孔子亦以為仁與其過而流無寧過而拘養生有二端曰持戒曰脩行持戒而不脩行厚已薄人則有外魔脩行而不持戒利人虧已則有内魔要之此二者亦近於吾道四勿三戒非持戒乎立人達人非脩行乎貪嗔癡愛人我是非茍不放下惡乎語道忍辱耐惡呼我牛馬牛馬應之此進道之基亦處世之方也隣臍三寸謂之闗言闗藏呼吸之氣以稟授四體也學道者常致氣於闗黄庭外景經觧在臍下三寸或云在臍之上三寸非也此為氣海非祖氣也守氣海者易於見功故術家嘗以此愈疾然無益於長生三焦者水穀道路氣所終始也上焦在心之下胃口之上所謂膻中也中焦在胃中脘下焦在臍下一寸然此又非手少陽之三焦也手少陽之三焦所謂有名無形者也藥者療也所以療疾也無疾勿藥可也肉不勝食氣况藥乎藥有偏效而無全功金石之藥最為酷烈其傷生最速其他草木之藥近於熱者皆能腊毒古人服松脂而塞腸服杏仁而致泄服楮實而痿骨服首經而消渇服鷓鴣鳩子而發咽㗋之病種種不可枚舉養生者最宜愼于此按摩為養生之一術勞役者資之而血不越亂佚惰者資之而氣不壅滯若素養者何資哉内經云冬不按蹻春不鼽衂盖冬月固密之時引動肢節陽氣泄越至生發之候血遂妄行故有鼽衂之疾心茍無事則息自調念茍無欲則中自守手握固而氣窒目𦂳閉而神馳搬運錯而瘵成注想深而中結此養生者之過也日念善而惡境不見夜念善而惡夢不生以和召和也先廷尉少與徐文貞公宻習同朝時亦時相顧問其後先廷尉以言謫戍及赦歸里先後三十年文貞公推轂不及而先君亦無一牘通也公伯子太常毎以使歸里先君以父執自居送迎不出户太常不堪其門客又從臾之間隙遂生已穆宗登極詔起言事者吏部以先君輩三十三名上請得㫖進用而文貞公雅不欲先人入朝乃語吏部曰建言中有望雖素著年力衰遲者宜酌處時先君年七十五竟以御史加大理丞致仕同加者魏公良弼等六人文貞弟侍郎公大不平曰柰何為馮先生一人而遏五老哉此軰皆天下人望抑困數十年而不一起非朝廷奬直㧞滯之意國家方延耆碩為表儀非若有司以筋力奔走此胡可以尋常年限也况引年者臣子自引豈朝廷計其年而使之引哉此舉悖矣其後不肖起廢公孫太常君與其黨又多方排之嗟乎風威霆怒崇朝則觧乃齒頰餘釁至於兩世䜛間之為害若此然不肖行能無數即乆滯藩臬亦分所宜而獨惜先君恢博之才正直之操不獲一試此天下所為慨嘆非止愚兄弟拊膺也詩曰彼有㫖酒又有嘉殽洽比其鄰婚姻孔云是時政亂崇賄輸金載玉不知其幾而獨以酒殽為言詩人之温厚若此嗟乎苞苴之昌末世尤甚匪特用以媒進且用以妨賢矣詩人而在不知作何浩嘆世道之衰匪特士大夫無先軰典刑即布衣巖穴風致亦與前人逺矣余先君有友錢穀號霽峯先生少同學相善先君既拜御史錢先生時來宦邸至經嵗語不及私其後先君家居錢先生貧甚毎遺之粟帛不却第取用而止過厚則必辭終三十年未嘗居間一事也既沒而家徒壁立先君為殯斂之又有謝簡者字一黙先君延為館師誨余兄弟三人嵗餽米三十斛先生晨而入館三商而歸五年如一日未嘗他適自束脩外即一縑一錢亦固却不受督學王公某與先人善有謀入庠者以五十金為先生夀丐主人一言先生曰主人不鄙夷我而以子師我我當以道義為之範硎奈何營營阿堵示之佻薄耶其人慙而去又有張永思者少失父與母居母守節數十年至九十矣永思亦年七十餘定省如兒時毎當酒筵常辭不赴間至亦僅嘗一味曰此皆母所未啖余何忍食先君覺其意毎召公必更設一席以遺其母公僅受數味堪以養老者俟母既食而後食至夜則置褥母榻下一聞謦欬則蹶然起視未嘗一夕入内也有司有與公厚者遺之粟則拜而受遺以金則必反或説之此戔戔者但足餬其口寧足實槖哉事有不傷於義者居間可也公曰此非但僕所恥為亦老母所羞聞終其身竟無干謁是三公者皆先君友也先君没後三十年不肖軰所交布衣不少曽有三公風度否時俗益偷若此余嘗欲為獨行傳傳三公不能記其詳漫書於冊以志慨徐叔明甚厭山人曰山人當岩居穴處而奈何日置足朱門也漢時授侯者皆遥授不之國今諸山人亦當稱遥授山人吾無計其詩詞工拙即掲其目但有簡某翰林某給事等類者吾不欲觀之矣有某郡守謂余曰子知呉下三厭耶山人詩卷與士夫干請之書僧徒募縁之冊在坐者或笑曰此可稱三黨夫山人之口譽於四方謂之外黨士夫之口譽於中朝謂之内黨曰然則僧徒稱何黨耶曰今世士大夫有高名者多佞佛施之可得其心且有佛力為隂助寕非黨耶此可稱上黨一座絶倒雖然山人中有如管寧黄憲者吾且執脯脡師之有如孟浩然陸龜蒙者吾且執鞭鐙隨之舍此則皆百尺樓下物也遠之可也小雅者天子逮下之詩大雅者天子述祖之詩小雅之變者哀怨刺譏之意多大雅之變者憂憫規正之詞切盖周太史所命孔子刪之而未嘗易其次也詩有南雅頌為天子所用樂章其十三國之詩止陳述以觀風不用之廟朝惟列國自為歌咏而已六義曰風曰賦曰比曰興曰雅曰頌起於周禮太師掌之或以風為孔子所命非也夫先乎婦故闗雎求淑女君先乎臣故鹿鳴享嘉賔詩為樂樂主和地天成泰和之道也故不温柔不敦厚不可以為詩春為陽中秋為隂中春秋所自名也尭舜用中以治天下孔子用中以教天下孔子贊易古之聰明睿智神武而不殺稱善人曰勝殘去殺語季康子曰子為政焉用殺大學一書於妨賢病國小人深惡痛絶之然止曰迸諸四夷不與同中國未嘗言殺也聖人之愼殺如此哉孔子四教六藝古聖王之教也學者優游漸漬其中上焉者以達次焉者以立此萬世不與易也王文成之即心即性即心即經本為支離者鍼砭然其末流未免虚而失實内而遺外甚者恣心順意糟粕其經脱畧於教長游談而廢實學此憂世者所深慮也春秋卿大夫交接以㣲言相感稱詩以喻志皆取風雅頌之辭不必自賦盖所以重先民明退讓宗道徳畧辭采末世之詩不以明志於何可稱至乃酒食徴召刻燭分韻流連光景而古時雅㑹之風不可復覩矣江左以來又有酒令壯士恥之酒以令行豈合歡之㫖詩以韻分豈感物之義楚聲杳𣺌秦聲雄髙漢因之而為樂府其曲大備然視二南之風化固已蔑矣建安風骨遒上而深渾不足應徐輩之公讌諸作靡麗之開源矣陳思洛神之賦淫艶之濫觴矣知風之自㣲矣哉孔與老同時至從問禮且稱其猶龍而未嘗攻也孟在老之後其著書闢楊墨而不闢老蓋老子深矣常無觀妙常有觀徼豈專於虚無耶老氏没而得其傳者寥寥九還絶穀之術非大患有身之㫖也役使鬼神之説非以道莅天下其鬼不神之㫖也自周以來惟漢文帝得老之㫖以治天下而漢刑措許旌陽得老之㫖以治邑而邑無訟王何之任誕嵇阮之放曠老之罪人也始旌陽問道於女師諶母母教之曰一念不欺為忠一事不茍為孝其語約而盡諶母以仙去亦老氏之徒哉造寺寫經度僧佛門敝法也達摩目之為有漏果為有為法非真得釋氏袈裟何以確然持其說如此廓然無聖一語可謂佛門曽子矣自性戒自性定自性慧不離平等日用而語益圓通慧能亦得其宗㫖哉或曰佛圖澄來趙鳩摩羅什來秦天為殺機盛而生是人營之也猶孔生春秋孟生戰國其然乎余居鄉日見有建水陸齋供浮屠治䘮者心竊非之謂人生罪過寧可以鳴梵誦偈釋此至愚者所為非士君子所當循有盛生者合掌語曰公何毁佛余曰余最信佛若乃毁佛耳釋氏之教明心見性心性茫昧觸為罪過乃以一飯一果一經一偈而求解脱則心性可無明也為惡一世而取脱於一二日之齋人亦何憚而不為惡是釋教為人開惡門非為人導善路也此豈瞿曇㫖耶生以為然憶余守鄖時曽下教有司令其力禁民風一變有一生不能自已以一比丘閉户而誦經令請繩之余曰治道去其太甚所謂禁者慮費民耳苟無甚容之可爾然格心之化余有愧哉海上鱗族異者名章拒大者名石拒居石穴人取之能以脚粘石拒人故名形如筭袋八足長二三尺足上磈礧戢戢如釘毎釘有竅浮海砂中如死物鳥啄之即捲入水噓足釘啜之以飽其小者名章拒又别一種生海塗中名望潮身一二寸足倍之土人呼塗蟢又一種脚短而無釘者名鏁管寧台温皆有之余鄉太倉上海無有也其名章拒盖江東子弟所名項羽引江東卒與秦戰秦將章邯拒之卒為羽所降故江東名是物章拒人怯而負勇名者亦號章拒鱟形如覆釡大如車青褐色其血碧色口足皆在覆釡之下足有十二長五六寸尾勁而尖長二三尺有刺能觸傷人尾中有珠如粟色黄雄小雌大置之水中雄者浮雌者沉南人或𢃄其珠或磨飲之云利市殻堅硬腰間横文一線軟可屈摺毎一屈一行牝常負牡牝牡相随牝者背有目牡者則無牝去則牡死故海上稱婦女徤壯操家者號為鱟是物在海中羣行輙相積於背髙尺餘如㠶乗風㳺人呼為鱟㠶其衆如簰筏名鱟簰東夷取其殻為冠尾為小如意子如麻子温人取以為醬甚美王叅知暘谷曽以餉予館客沈士能甚嗜之余未嘗舉箸也客語予此物得隂氣甚益人隂余笑曰蔬食飲水者隂何嘗不足顧余生平於竒物未嘗入口非特此也闌胡如小鰍而短大者如人指長三五寸頭有斑㸃如星潮退數千百跳躑塗泥中土人施小鈎取之一名彈塗以盂覆活者數百於地旦發視之皆駢首拱北盖亦朝斗之意𤣥脩者忌食唐制賣鯉者賣蠡者皆杖六十盖鯉朝日蠡朝星食者皆有祸闌胡雖小頭亦有星故土人皆戒勿食鯼魚即石首魚也小者曰􅀈魚又名鰌魚最小者名梅首又名梅童其次名春來初出水能鳴夜視有光土人以槐豆花卜其多寡槐豆花繁則魚盛腦中有白石如棊子取其石嵌以為噐盛飲食遇毒則暴裂腦漏者用其石燒灰吹入鼻中即愈又下石淋炙食之主消􅏨成水至秋化為冠鳬又有䱟形相似左右三牙如鉄鋸或曰石首雄䱟其雌也諸魚有血石首獨無血僧人謂之菩薩魚至有齋食而啖者盖亦三浄肉之意不能忍口腹而姑為此說以自觧非正法也黄駒即䲅魚俗所謂河豚也一名鮭一名嗔一名鮠一名鶘夷一名鯸鮐腹無膽頭無腮其肝最毒獨眼者尤甚海上人得之去其頭尾用橄㰖甘蔗煮之然初出時可食至後則其毒尤甚諺曰蘆青長一尺不與河豚作主客予鄉亦盛食之春時延客不得此為不敬然徃徃有食而死者或曰煮熟則無患多食亦發瘍厚生者所當戒樂清人名為烏狼膏魟魚形圓似扇無鱗色紫黒口在腹下尾長於身如狸䑕其最大曰鮫其次曰錦魟曰黄魟曰斑魟曰牛魟曰虎魟魟字或作䱋文選所謂鱝魚也尾端有刺甚毒大抵諸魚性熱而海魚尤熱不可常餐䖳魚一名蟦一名摴蒲一名水母俗所謂海蜇也雨水多則是物盛其形如覆笠以鰕為目鰕動則沉土人食之皆以為去積其實損脾南人以為性暖能治河魚疾玉珧一名蜃珧所謂江瑶柱也其柱肉脆羙其甲可飾珮刀鞘盖蜃之小者海月大如鏡白色正圓其柱如搔頭土人鱗次之為天忩沈大叅一中嘗稱其鄉海錯之美如海月江瑶柱可敵三呉百味樂清甚盛石勃窣形短圓三寸長四寸身赤腹泡急其形勃窣故名一名來魚或曰石屑入水所化牡蠣言牡非謂雄也一言鹹水結成一言百嵗鵰所化道家以左顧者是雄名牡蠣右顧者名牝蠣其生著石磈礧相連如房一名蠔山初生纔如拳石四面漸長有一二丈嶄巖如山毎房有蠔肉一塊大小如房廣狹大房如馬蹄小房如人指面毎潮來則諸房皆開有小蟲入則含以充腹海人取之皆鑿房以烈火逼開取肉食之漁者於海淺處植竹扈竹入水纍纍而生研取之名曰竹蠣文選𤣥蠣磈磥而碨䃁註云長七尺形如馬蹄又謂梅花蠣是物除熱補傷澁精益血土人用以為醬曰蠣黄醬樂清縣新溪口有蠣嶼方圓數十畆四面皆蠣其味偏好􅒕䗯似小蛤而長匾殻有毛是物行有前無却故名沙噀塊然一物如牛馬腸臓頭長五六寸無目無皮骨但能蠕動觸之則縮小如桃栗徐復臃腫土人以沙盆揉去其涎腥雜五辣煮之脆羙為上味樂清名沙蒜西施舌一名沙蛤大小似車螯而肉自殻中突出長可二寸如舌温州公嘗與人食此戲曰西施舌如此亦不足美其人曰非也舌長能搬㺯可稱張儀舌是物海燕所化久復為燕其性熱􅚝魚即刀魚也一名魮文選所謂鯼魮順時而徃還是也子多而肥腹皆似刀夏初曝乾可以致逺又名䱥魚文字集畧䱥亦作鰶字音祭又音制炙食甘美諺曰寧去累世田宅不去䱥魚額􅤤魚身柔如膏無骨鱗細口濶齒多一作䱠海上人目人弱者曰􅤤比目魚二魚相合乃行單則為王餘竹夾魚似比目而肉堅身圎尾尖色青黒一名土鱧馬鮫魚形似鰫味似鯧一曰社交以交社而生綬魚一名華臍一名老婆牙其腹有帶如帔子生附其上形如科斗大者如盤或曰此文選所謂琵琶魚也無鱗冬初始出者俗重之至春則味降矣吐哺魚一名土附以其附土而行也或曰食物嚼而吐之故名鮸魚狀似鱸而肉粗三腮曰鮸四腮曰茅鮸樂清志所謂繁魚是也一曰茅狂青鰶魚冬月肥美海錯之佳者或以此敵松江之鱸張汝逺曰此如邾莒之於齊魯豈其方鯊鮀也以皮有沙名其小者大如指圎而長有墨㸃文能吹沙春正月輒至魚最先至者海上鯊甚多有白蒲鯊有黄頭鯊白眼鯊白蕩鯊青頓鯊牛皮鯊斑鯊鹿文鯊狗鯊􅤤鯊燕尾鯊虎鯊犁頭鯊香鯊熨斗鯊了髻鯊劔鯊刺鯊鋸鯊烏鯊雷鯊凢二十餘種䱜魚長二丈大數圍小者圓廣尺餘狀如鼈無足背粗錯有文皮皆可鑢物子小隨母覓食驚則還入母腹一名鮫魚皮間有珠可飾劔有横骨在鼻前如斤鋸者曰胡沙性良肉羙箭魚即鰣魚也腹下細骨如箭鏃首夏以時至而名本朝甚貴之何景明詩銀鱗細骨堪憐汝玉筯金盤敢望傳本草稱其補虚勞稍發疳痼肋似箭而小海鷂魚即文鷂類也形似鷂有肉翅能飛上石頭齒如石板出主風又有白袋似牛而白自海入江則兆水澤諺曰海鷂風伯使白袋雨師奴鯔魚似鯉生淺海中専食泥身圓口小骨軟肉細似鯔而大者曰䱟介象與吳王共論魚以鯔魚為上取其益陰蠞即蟹也經霜則有赤膏曰赤蟹無膏曰白蟹蟹始穴沮洳稲熟時乃出各執一穗朝其魁或曰以輸海神入江則稍大入海益大廣雅雄曰􅀈䱺雌曰博𢃄酉陽雜爼云其腹毛能殺人性能敗漆燒之致䑕浙蠏有數種一曰蝤蛑南人謂之撥棹言力可撥棹也兩螯至彊能與虎鬭虎不如随大潮退殻一退一長一曰蟳乃蝤蛑之大者兩螯無毛一曰擁劒一螯大一螯小常以大螯鬬小螯食又名桀歩一曰虎蟳大者有虎斑文一曰招潮殻白潮欲來出穴舉螯迎之一曰灘塗一曰石􅀈一曰蜂江一曰彭蜞似蠏有毛而赤性極寒一曰彭越即彭螖也一曰竭樸大於彭蜞黒斑有文以大螯障日用小螯以食一曰沙狗穴沙中見人則走或曰沙鈎從沙中鈎取之也味甚羙一曰數丸競摶土作丸滿三百而潮至一曰蘆虎兩螯正赤不可食一曰螠似彭越而小一曰䘂肉殻而多黄其螯最鋭斷物如芟刈焉食之行風氣凢蠏漆相合則化為水服之長生是物以觧結散血得名惟霜後可食餘節食之多致疾孕婦尤忌獨螯獨目四足六足兩目相向者皆有大毒不可食雁山五珍謂龍湫茶觀音竹金星草山樂官香魚也茶一鎗一旗而白毛者名明茶紫色而香者名𤣥茶其味皆似天池而稍薄觀音竹形小葉長翠潤奪目植巖石上經冬不凋金星草葉上有星如金根中有黒筋如髮用以浸油能黒髪長髮山樂官似金雀聲如簫管香魚鱗細不腥春初生月長一寸至冬月長盈尺則赴潮際生子生已輙槁惟鴈山溪澗有之他無有也一名記月魚土人朱太守素無宦情嘗曰豈以五斗易我五珍周書王㑹赤奕隂羽之前馬有母兒有乗黄有兹白羊有煇炫犬有䶂犬鳥有皋鷄異獸有尊耳等類皆竒物其於魚曰揚州觧隃冦其於東甌載海蛤蟬蛇文蜃然如章拒等類尤竒不載也王敬羙言海錯竒羙無過兩浙然使他方遠人見圖經必以為此兹白尊耳之類侈言哉嗟乎天壤之中何所不有知山海經非臆說也黄精為藥上品服者得仙自古志之乃富貴人服者多不驗盖黄精色黄味甘土氣之精野處辟糓者服之補脾益氣即不得仙亦可延年若富貴者思慮糅雜五臓皆火兼以膏粱助邪益穢乃服如此甘温之藥是猶燃燎而濟之風也其傷愈甚安得有驗余在錫穴值嵗大饑教窮民蒸曝餐之皆得度嵗盖是物於藿食之腸尤宜耳太和山毎嵗貢黄精笋尖數十扛於京師本山所産無幾皆取之近山旁邑内使𨽻役徃來需擾封原禁隰使民不得種植孫中丞欲請罷貢而未果然以無益害有益則仁人所惻然也王昭明先生者婁江人潜心聖學非禮勿動曽與羅念菴先生逰又嘗客盱江與南城鄧公元錫居數月其所為六經說多發前人所未發惜既沒而子孫貧甚不能存其書管公志道與周生道甫各得其一二皆以為帳中之秘未嘗示人即今鄧南城所著易緯等書大半取其語又呉縣王少湖先生行誼無媿顔閔其於學宗朱紫陽然人亦罕有知者晚嵗袁宗伯洪愈薦諸朝詔授國子博士年垂八十矣嘗與周道甫語二王先生皆大賢也然姓名不出里閈而沈石田王雅宜軰以字畫之技傳聞四逺甚矣末世好德者之鮮也然余見二先生真所謂聲為律身為度見善如不及見不善如探湯使在孔門當不後於十哲知不知乃其所遭也子思不云乎君子依乎中庸遯世不見知而不悔聖賢固不求人知也道甫又與予言弇州四部不如少湖數語余曰豈惟是哉老杜詩千百篇寧如武公抑戒賔筵二篇學者亦何必誇多鬬靡為淮南子云昌陽去蚤蝨而來蛉窮去害小而來患大蛉窮即蜒蚰也聞人髪脂油香則入人耳及諸竅中昌陽香酷能召是物故淮南子以為喻是物好濡雨升髙則焦死故曰蛉窮一曰陵窮乗陵則窮也宋史小人居髙位者亦目蛉窮慰者白蟻也人家有之則敗屋故相弔慰聞竹鷄聲即化為水竹鷄自呼為泥滑滑海上謂之柱石鷄蛓者螫人蟲也身扁緑色似蠶而短無足有毛楚辭以喻䜛人九思所謂蛓縁兮我裳是也常在林間花葉背不知者輙為所刺一名林蛓蟲之最惡者也老則吐汁自裹乆漸堅凝如巴豆大就其中作蛹謂之蛅蟖䑕於果熟時竊取覆蔵之有人掘䑕穴得栗橡百果多至石故北人目善畜財者曰䑕䑕首出穴先觀望前却故謂之首䑕北人目南人為䑕以其善窺探也鼷䑕在樹上名甘口䑕嚙物時不痛而甚毒亦名林䑕鼹䑕乃伯勞所化又能化為鴽見日月光則死盖隂物也窮竒逢忠信之人輙齧食之逢邪人捕禽獸飼焉惡正向邪物亦有之何疑於人故共工誣害盛德比於窮竒玃能盗婦女以為妻􅀈能牽男子以為夫然而生子仍為獸不為人也温州有乳柑其味甚珍陳將軍曾以饋余自温至錫穴數千里不變問何以然曰採時不去其枝葉則氣不泄盛時以緑豆為末劑其温性則氣不蒸故乆而不變若藏梨者多用沙盖梨性寒惡濕熱沙能制濕故也張福者淮隂鹽徒也性悍恣不下人一日乗凉樹下有老僧同坐老僧忽舉手擊張一掌衆皆為僧危之謂此惡少奈何犯虎口哉張黙然僧又擊一掌不應至三擊則叩首曰吾觧師意矣僧曰爾來至一菴與對坐旬日語張曰若有得矣須歸富貴人有善根者為外䕶若妻子請謝絶勿念也張歸舍其妻方與他少年淫媾其人自床投地請死張曰若有縁也無恐不知若有室乎少年對曰未有張曰子請遂以為妻又呼其子與隣老未有子者子之曰亟去無來迹我乃竟徃投萬總戎鹿園萬問之曰若何能曰請為閽者司出入萬因置之門萬本大家男婦常數百人出入無忌張日危坐於戸至晚必報主人今日某某出某某入有戲豫無禮蹈法者必告居三月萬氏門肅然無譁又數月萬知其愿確可托也命之守書舍司金錢出納則銖兩無爽有不經者必裁節之一日萬自外歸見張坐其所坐處呼曰若胡敢踞我坐張起而對曰將軍胡無平等心也萬登坐覺坐席熱如火心異之又一日萬自外來則張寝其床萬又呼曰若何乃爾則又曰主人胡無平等心也萬登床覺床如火炕大異之時有吏部郎過淮得瘵疾甚危萬以語張張曰請為療之乃相與背坐吏部郎覺背如火熨也旬日而瘵愈遂徃京去一日張請於萬曰小子脩𤣥有㣲效矣請一静室求一姬為伴萬乃呼婢數十人使擇張曰是皆不堪請將軍所幸姬萬難之已度其人非酒色徒也何難一姬以妨大道竟與之張乃挈一姬一婢入室鑿牆而進飲食居八月以姬還萬萬詢婢曰彼日與姬對坐相去函丈未嘗近也姬亦素好道平日閉户焚香掃地而坐毎以悟真篇問張張不答亦竟無一語也張自出闗則請主人白布數丈白金二兩又書字一紙緘之與銀布同置一箱請以某日開萬如其言居亡何詣萬前曰小子歸矣叩頭而出萬留之不得使人亟追之其行如飛不能及已至故所遇老僧處趺坐合掌而化萬乃開其所緘箱則上書曰小子以某日行請以布斂以金制龕主人親封之萬乃歎惜恨失至人也居有頃前吏部郎自長安以請急歸來謁萬萬曰若知張福化乎吏部郎曰吾於濟上遇之談笑竟日胡遽有此萬亟開龕則僅有布在其骸不見矣萬諸僮嘗見之淮徐間萬本名將晚嵗好𤣥毎日静坐守中張謂此有為法非無上道萬毎叩其有别術不語但曰天下無有富貴神仙孰能棄三公而薦天下賢者以澤蒼生孰能棄萬金而施貧者以脱人於死孰能割恩愛塊然獨處而與虛白為對無是三者請勿語道少司馬許公孚逺亦識其人津津稱之曰世故有此異人也離騷秋之為氣也憭慄兮若遠行登山臨水兮送將歸是數語杳𣺌凄清味之不窮古詩十九首有人生天地間忽如遠行客句祖此也或曰洞庭波兮木葉下言秋之祖曰非也秋日凄凄百卉具腓蒹葭蒼蒼白露為霜此言秋之祖也王孫兮不歸春草生兮萋萋本之何草不黄何日不行何人不將而詩語更深渾矣春草秋更緑公子未西歸意祖於騷而格調自下黄庭經琴心三叠舞胎仙九氣暎明出霄間琴和也和其心使丹田如叠物然静之至也而胎息之仙融融活活若舞若飛豈有為注想之謂哉三元九宫氣象炳煥妙無方所所謂出霄間也七莛玉籥閉兩扉重掩金闗宻樞機言無視無聽也兩目曰兩扉金闗為口史㳺急就篇有長樂無極老復丁本之黄庭物物不干泰而平慤矣匪事老復丁物物不干則淡然無欲矣寧不反老為壮丁哉王次公之詩勝長公而闗中集尤佳稲花香裏流温玉水月空中出聖燈盛唐語也雲屯逺山白氣入髙原踈闗山掛新月枕簟如秋天初唐語也腰間有組休論貴馬首無山未是遊似晚唐而有致中原草根盡少婦木衣穿有女償官犢無家問子錢近於風矣郭相奎嘗著雪應豐年辨曰雪係於地氣閩廣無雪而宜五榖戎地多雪而不生五穀大戴禮云天地積隂寒則為雪曾子曰隂氣勝則為雪論雪者莫辨於此矣故三尺雪十年豐此世俗之語君子不道也愚謂雪者隂氣所積當冬而雪隂得其令亦豐之兆若雪太多隂氣過盛則為水徴詩云上天同雲雨雪雰雰益之以霡霂註云冬有積雪春而益以小雨則潤澤而饒洽雪之兆豐自古然矣惟是遺蝗入地千尺之說則為謬妄蝗本春夏間暑暵之氣所生至秋冬交則槁未有遺於地而復生者也或曰蝗乃魚卵所化春魚遺子如粟沒泥中明年水及故岸皆化而為魚遇旱乾水縮不及故岸則其子為日所暴生飛蝗其說近似魚子無入地之理且雪雖盛不能殺諸蟄而柰何獨能驅魚子使之走地千尺此真世俗語也鼈與蛇相為牝牡相為生化有人發沙穴嘗見鼈與蛇俱鼈暮出取食跡在沙上蛇輙出為滅之鼈遺子蛇噓之輙成蛇乆復為鼈三足者能音台天文斗奎下六星兩兩而比者曰三能鼎三足象之能亦三足在旁二腹中一甲蟲之有神者人食之化為水郭相奎嗜鼈行部瀘州吏以鼈進騐之三足乃投諸江作活能說戒庖人母再炰鼈因著為家令余亦有戒鼈記坎為月為水故蛤蠏螺龜與月盛衰月生明則蚌珠生螺肉充蟹黄滿月死魄則蛤珠焦蟹黄虗螺肉消或曰水主智龜知吉凶水之德也道書龜為地甲殺者奪壽活者延年宋仁宗問長生術於雁蕩木葉老人老人曰無他廣濟貧民禁天下捕龜能斯二者乃可語道毛氏者崑山人父為别駕冨於財以女歸侍郎周廣之子周士淹士淹舉明經承家業又得毛氏資鉅萬豪里中然士淹嘗從魏莊渠先生講學言動造次一依乎禮不為貴介態也毛氏歸周夫妻朝夕相敬如賔又善治生業日益拓年三十餘無子語周曰吾聞古人娶婦取宜子者今某奉巾幘乆未有一綫之息以為君憂胡不納副室以廣嗣續周初不可曰命也吾當有嗣一䕫足矣毛强之出數百鐶納二姬以進其夫居嵗餘未有子又謂周曰語不云乎田廣多穀女廣多子盍再求窈窕乎又市四姬以進合毛共七人矣副笄歩揺之飾嫡庶無二毎飯則合六人同侍其夫飯已則挈之同遊後園已復曰母已太康令之各事所業或刺繡或織布身與同作良乆曰若且倦矣且更遊息夜則貫魚以當夕不獨專也士淹計偕卒於途竟無子毛氏以禮遣六妾各贈百金而去曰彼以好來宜以好徃無為先夫羞諸妾既嫁乃立其伯子為嗣閉户獨處足不履閾以終其身歸子遇嘗與余言婦人不妬不淫如毛者真女中傑出不可無記端午前一日漫書於署吾郡文待詔先生年九十生平無二色比部錢公有威亦然公與其室宜人今皆踰七十矣公生平目未嘗視季女宜人一日進二婢以嘗公公矍然曰女三為粲康公且不敢當况區區耶亟去無益人罪過沈士能嘗與予語錢公與管登之皆信佛然錢公此事真能信佛者也余生平食不二味用無長物然所謂不二色者則安能如待詔比部哉皇甫涍九日詩鵾鳴入怨柱蛩響切離裯楓落他鄉早尊寒故國秋又河虗平夕霧閣掩澹秋塵素月昇逾静髙霞斂更新又新月詩㣲暉不照綺清漢欲生塵鴈山詩遥靄引踈磬羣峰寒暮天四傑之槩也公負才傲睨曾為春坊司直卒以䜛廢然郡中稱其人甚介謂皇甫白眉皇甫汸牛首山詩齋關閉秋雨寒磬落江潮虎丘詩草緑知春半花飛覺雨深蔡館詩户下鳴螿頻𢃄雨湖邊落木似催年錢塘江詩半㠶布影懸初月幾處漁燈㸃落潮在唐盛中間公以早廢所詠詩甚富其詩名與王元美相齊呉下能詩者朝子循而夕元美或問其優劣周道甫曰子循如齊魯變可至道元美若秦楚强遂稱王春和融融仁之象也秋氣肅肅義之象也人心與天地萬物神通脉接常存此心四時之氣自備文章士人之冠冕也學問士人之噐具也節義士人之門墻也才術士人之僮𨽻也德行士人之棟宇也心地士人之基址也先君子嘗以此教不肖而諄諄然令其厚養心地又曰用人以觀察心地為正以駕馭才術為權雨航雜録卷下

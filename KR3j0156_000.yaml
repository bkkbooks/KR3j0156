body:
  text: 雨航雜録雜家類三雜說之屬提要臣等謹案雨航雜録二卷明馮時可撰時可字敏卿華亭人隆慶辛未進士官至湖廣布政使司參政是書上卷多論學論文下卷多記物産而間涉雜事隆萬之間士大夫好為髙論故筆記說部往往滉漾自恣不軌于正時可獨持論篤實言多中理如言漢人之於經臺史之測天也不能盡天而觀象者莫能廢宋人之於學規矩之畫地也不能盡地而經野者莫能違又曰子靜之求心而其徒棄經典紫陽之窮理而其徒泥章句非教者之過學者之失也又曰宋儒之於文也嗜易而樂淺於論人也喜核而務深於奏事也貴直而少諷皆平心靜氣之談其論王世貞悲歌碣石虹髙下擊筑咸陽日動搖句以為近於匠作而逺自然正其一病又引徐叔明語論世貞為人作傳志極力稱譽如膠庠試最乃至微細事而津津數語此非特漢以前無是即唐宋人亦無此陋識亦皆有見惟其論十三經注疏立而西京諸儒之訓亡未免失之過髙偶涉當時習尚耳乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:dc316b93bbdc421fad401c0f99298ca339a34ca2964a04c2886529e2c55c0c29
